<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP Verification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

        * { box-sizing: border-box; }

        .concepts { display: flex; flex-direction: column; gap: 48px; padding: 1.5rem 0; }

        .label-tag {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            background: var(--color-background-secondary);
            color: var(--color-text-secondary);
            border: 0.5px solid var(--color-border-secondary);
        }

        .c1-wrap {
            max-width: 460px;
            margin: 0 auto;
            background: #0f1117;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2d3a;
        }
        .c1-titlebar {
            background: #1a1d27;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #2a2d3a;
        }
        .c1-dot { width: 10px; height: 10px; border-radius: 50%; }
        .c1-titlebar-text {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #555;
            margin-left: auto;
            margin-right: auto;
        }
        .c1-body {
            width: 100%;
            padding: 32px 28px 28px;
        }

        .c1-prompt {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #4ade80;
            margin: 0 0 6px;
        }
        .c1-title {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #f0f0f0;
            margin: 0 0 20px;
            line-height: 1.3;
        }
        .c1-desc {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #6b7280;
            line-height: 1.8;
            margin: 0 0 28px;
        }
        .c1-code-block {
            width: 100%;
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }
        .c1-digit {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: #4ade80;
            width: 36px;
            text-align: center;
        }
        .c1-sep {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            color: #2a2d3a;
        }
        .c1-bar {
            height: 2px;
            background: #1a1d27;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .c1-bar-fill {
            height: 100%;
            width: 35%;
            background: #4ade80;
            border-radius: 2px;
        }
        .c1-expire {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #4b5563;
            line-height: 1.7;
        }
        .c1-expire span { color: #f59e0b; }
        .c1-footer {
            border-top: 1px solid #1a1d27;
            padding: 14px 28px;
        }
        .c1-footer-l { font-family: 'Space Mono', monospace; font-size: 10px; color: #374151; }
        .c1-footer-r { font-family: 'Space Mono', monospace; font-size: 10px; color: #374151; }
    </style>
</head>
<body>
    <div class="concepts">
        <div>
            <div class="c1-wrap">
                <div class="c1-titlebar">
                    <div class="c1-dot" style="background:#ff5f57"></div>
                    <div class="c1-dot" style="background:#febc2e"></div>
                    <div class="c1-dot" style="background:#28c840"></div>
                </div>
                <div class="c1-body">
                    <div class="c1-prompt">$ otp_verify --user=<span th:text="${email}"></span></div>
                    <h2 class="c1-title">Access<br>verification<br>required_</h2>
                    <p class="c1-desc">Your one-time password is ready.<br>Enter it before the session expires.</p>
                    <div class="c1-code-block">
                        <div class="c1-digit" th:text="${otp[0]}">3</div>
                        <div class="c1-sep">·</div>
                        <div class="c1-digit" th:text="${otp[1]}">2</div>
                        <div class="c1-sep">·</div>
                        <div class="c1-digit" th:text="${otp[2]}">8</div>
                        <div class="c1-sep">·</div>
                        <div class="c1-digit" th:text="${otp[3]}">2</div>
                        <div class="c1-sep">·</div>
                        <div class="c1-digit" th:text="${otp[4]}">0</div>
                        <div class="c1-sep">·</div>
                        <div class="c1-digit" th:text="${otp[5]}">6</div>
                    </div>
                    <p class="c1-expire">expires in <span th:text="${expiration}">02:00</span> minutes · didn't request this? ignore safely.</p>
                </div>
                <div class="c1-footer">
                    <div class="c1-footer-l">© 2026 Spring-Group-01-Siem Reap</div>
                    <div class="c1-footer-r">Consistency is the key to success.</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
