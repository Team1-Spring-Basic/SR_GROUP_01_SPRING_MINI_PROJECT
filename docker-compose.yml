version: '3.8'

services:
  db:
    image: postgres:16-alpine          # pinned stable + lightweight (better than :latest)
    container_name: habit-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgresdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123   # Change this to something stronger if you want
    ports:
      - "7070:5432"                     # ← Host port 7070 → Container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: habit-tracker-redis
    restart: unless-stopped
    ports:
      - "6060:6379"                     # ← Host port 6060 → Container port 6379
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: